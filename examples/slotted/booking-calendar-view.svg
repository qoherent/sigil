<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title description">
  <title id="title">Booking calendar layout</title>
  <desc id="description">A calendar with date navigation, room rows, and open or booked time slots.</desc>
  <rect width="960" height="520" fill="#f7f7f5"/>
  <rect x="40" y="40" width="880" height="440" rx="18" fill="#ffffff" stroke="#252525" stroke-width="2"/>
  <rect x="72" y="72" width="816" height="64" rx="10" fill="#ecebe7"/>
  <text x="104" y="112" font-family="system-ui, sans-serif" font-size="20" fill="#252525">Previous</text>
  <text x="480" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#252525">July 2026</text>
  <text x="856" y="112" text-anchor="end" font-family="system-ui, sans-serif" font-size="20" fill="#252525">Next</text>
  <g font-family="system-ui, sans-serif" font-size="18" fill="#252525">
    <text x="92" y="184" font-weight="700">Room</text>
    <text x="278" y="184">09:00</text>
    <text x="438" y="184">10:00</text>
    <text x="598" y="184">11:00</text>
    <text x="758" y="184">12:00</text>
    <text x="92" y="260" font-weight="700">Cedar</text>
    <text x="92" y="348" font-weight="700">Maple</text>
  </g>
  <g font-family="system-ui, sans-serif" font-size="17" text-anchor="middle">
    <rect x="240" y="220" width="112" height="58" rx="8" fill="#dff3e4"/><text x="296" y="256" fill="#174a27">Open</text>
    <rect x="400" y="220" width="112" height="58" rx="8" fill="#f3dddd"/><text x="456" y="256" fill="#6b2020">Booked</text>
    <rect x="560" y="220" width="112" height="58" rx="8" fill="#f3dddd"/><text x="616" y="256" fill="#6b2020">Booked</text>
    <rect x="720" y="220" width="112" height="58" rx="8" fill="#dff3e4"/><text x="776" y="256" fill="#174a27">Open</text>
    <rect x="240" y="308" width="112" height="58" rx="8" fill="#dff3e4"/><text x="296" y="344" fill="#174a27">Open</text>
    <rect x="400" y="308" width="112" height="58" rx="8" fill="#dff3e4"/><text x="456" y="344" fill="#174a27">Open</text>
    <rect x="560" y="308" width="112" height="58" rx="8" fill="#dff3e4"/><text x="616" y="344" fill="#174a27">Open</text>
    <rect x="720" y="308" width="112" height="58" rx="8" fill="#f3dddd"/><text x="776" y="344" fill="#6b2020">Booked</text>
  </g>
  <text x="72" y="438" font-family="system-ui, sans-serif" font-size="16" fill="#5a5a55">Layout reference; written Sigil defines required behavior.</text>
</svg>
