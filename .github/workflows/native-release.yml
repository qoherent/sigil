name: Publish native CLI release

on:
  push:
    tags:
      - cli-v*
  workflow_dispatch:
    inputs:
      version:
        description: Exact CLI manifest version to release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: native-cli-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: integrations/editor/vscode/package-lock.json
      - run: npm ci
        working-directory: integrations/editor/vscode
      - name: Resolve and validate version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then version="${GITHUB_REF_NAME#cli-v}"; fi
          actual="$(deno eval 'const value=JSON.parse(await Deno.readTextFile("packages/cli/deno.json")); console.log(value.version)')"
          [[ "$version" == "$actual" ]] || { echo "Release $version does not match CLI manifest $actual" >&2; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=cli-v$version" >> "$GITHUB_OUTPUT"
      - run: deno task fmt
      - run: deno task lint
      - run: deno task check
      - run: deno task test:core
      - run: deno task test:cli
      - name: Build native archives
        run: deno run --allow-read --allow-write --allow-run scripts/build-cli-release.ts --version '${{ steps.version.outputs.version }}'
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" build/release/* --clobber
            gh release edit "$TAG" --title "Sigil CLI $VERSION" --latest
          else
            gh release create "$TAG" build/release/* \
              --verify-tag \
              --title "Sigil CLI $VERSION" \
              --generate-notes \
              --latest
          fi
