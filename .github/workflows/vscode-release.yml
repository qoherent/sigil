name: Publish VS Code GitHub release

on:
  push:
    tags:
      - vscode-v*
  workflow_dispatch:
    inputs:
      version:
        description: Exact extension manifest version to release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: vscode-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: integrations/editor/vscode/package-lock.json
      - run: npm ci
        working-directory: integrations/editor/vscode
      - name: Resolve and validate version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then version="${GITHUB_REF_NAME#vscode-v}"; fi
          actual="$(node -p 'require("./integrations/editor/vscode/package.json").version')"
          [[ "$version" == "$actual" ]] || { echo "Release $version does not match extension manifest $actual" >&2; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=vscode-v$version" >> "$GITHUB_OUTPUT"
      - run: npm test
        working-directory: integrations/editor/vscode
      - run: xvfb-run -a npm run test:extension
        working-directory: integrations/editor/vscode
      - run: npm run package
        working-directory: integrations/editor/vscode
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          asset="integrations/editor/vscode/build/sigil-vscode-$VERSION.vsix"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$asset" --clobber
            gh release edit "$TAG" --title "Sigil VS Code Extension $VERSION" --latest=false
          else
            gh release create "$TAG" "$asset" \
              --verify-tag \
              --title "Sigil VS Code Extension $VERSION" \
              --generate-notes \
              --latest=false
          fi
