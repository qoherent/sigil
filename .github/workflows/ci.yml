name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: integrations/editor/vscode/package-lock.json
      - run: npm ci
        working-directory: integrations/editor/vscode
      - run: deno task fmt
      - run: deno task lint
      - run: deno task check
      - if: runner.os == 'Linux'
        run: xvfb-run -a deno task test
      - if: runner.os != 'Linux'
        run: deno task test
      - if: matrix.os == 'ubuntu-latest'
        run: deno task publish:dry-run
