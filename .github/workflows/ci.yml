name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.2
      - run: deno task fmt
      - run: deno task lint
      - run: deno task check
      - run: deno task test
      - if: matrix.os == 'ubuntu-latest'
        run: deno task publish:dry-run
